<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Shop — Komaura Beauty</title>
<meta name="description" content="Browse all handmade soft gel press-on nail sets from Komaura Beauty. Filter by vibe, shape, and finish.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232A1F1F'/%3E%3Ctext x='50%25' y='58%25' font-family='Cormorant Garamond, serif' font-size='18' fill='%23FAF7F4' text-anchor='middle'%3EK%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&family=Sacramento&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<div class="preloader"><div class="preloader__mark">Komaura</div></div>
<div data-include="navbar"></div>

<main>
  <section class="page-hero" style="padding-bottom:20px">
    <div class="container">
      <span class="eyebrow reveal">The Shop</span>
      <h1 class="reveal" data-delay="1">Every set, in <em style="font-style:italic;color:var(--rose-deep)">one place.</em></h1>
      <p class="reveal" data-delay="2">Handmade in Jodhpur. Made to order. Shipped worldwide.</p>
    </div>
  </section>

  <div class="shop-bar">
    <div class="container shop-bar__row">
      <div class="chips" id="filters"></div>
      <div style="display:flex; gap:14px; align-items:center">
        <span class="shop-bar__count" id="shop-count"></span>
        <select class="shop-bar__sort" id="sort">
          <option value="featured">Sort: Featured</option>
          <option value="price-asc">Price · Low to High</option>
          <option value="price-desc">Price · High to Low</option>
          <option value="rating">Top Rated</option>
        </select>
      </div>
    </div>
  </div>

  <section style="padding-top:0">
    <div class="container">
      <div class="product-grid" id="grid">
        <div class="skeleton skel-card"></div>
        <div class="skeleton skel-card"></div>
        <div class="skeleton skel-card"></div>
        <div class="skeleton skel-card"></div>
        <div class="skeleton skel-card"></div>
        <div class="skeleton skel-card"></div>
      </div>
    </div>
  </section>
</main>

<div data-include="footer"></div>

<script type="module" src="js/main.js"></script>
<script type="module">
  import { loadProducts, renderGrid } from './js/products.js';
  import { bindWishlistButtons, bindQuickAdd } from './js/cart.js';
  import { initReveals } from './js/animations.js';
  import { getQuery } from './js/router.js';

  const cats = ['All','Nude','Bridal','Chrome','Cat Eye','Red','Minimal'];
  const filters = document.getElementById('filters');
  const grid = document.getElementById('grid');
  const sortSel = document.getElementById('sort');
  let active = getQuery('category') || 'All';
  let sortKey = 'featured';
  let all = [];

  filters.innerHTML = cats.map(c => `<button class="chip ${c===active?'is-active':''}" data-cat="${c}">${c}</button>`).join('');
  filters.querySelectorAll('[data-cat]').forEach(b => b.addEventListener('click', () => {
    active = b.dataset.cat;
    filters.querySelectorAll('.chip').forEach(c => c.classList.toggle('is-active', c.dataset.cat===active));
    render();
  }));
  sortSel.addEventListener('change', () => { sortKey = sortSel.value; render(); });

  function render() {
    let list = active === 'All' ? all.slice() : all.filter(p => p.category === active);
    if (sortKey === 'price-asc') list.sort((a,b)=>a.price-b.price);
    if (sortKey === 'price-desc') list.sort((a,b)=>b.price-a.price);
    if (sortKey === 'rating') list.sort((a,b)=>b.rating-a.rating);
    document.getElementById('shop-count').textContent = `${list.length} ${list.length===1?'piece':'pieces'}`;
    if (list.length === 0) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><span class="script">Coming soon</span><p>This collection is currently in the atelier.</p></div>`;
      return;
    }
    grid.innerHTML = '';
    renderGrid(grid, list);
    bindWishlistButtons(grid); bindQuickAdd(grid); initReveals(grid);
  }

  (async () => { all = await loadProducts(); render(); })();
</script>
</body>
</html>
